name: Validate testing skills and runner

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Build generated Skill packages
        run: |
          python tooling/build_skills.py
          python tooling/build_skills.py --check
          python tooling/validate_skills.py

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Validate eighth runtime release contracts
        run: |
          python -m unittest tests.test_eighth_skill_release_workflow tests.test_github_install_launchers -v
          node --check packages/testing-runner/scripts/render-windows-installers.mjs

      - name: Build and test Runner
        run: |
          npm run build --workspace @saitamasans/testing-runner
          npm test --workspace @saitamasans/testing-runner

      - name: Test bootstrap, reports, and release package
        run: npm test

      - name: Placeholder scan
        shell: pwsh
        run: |
          $patterns = @(("TO" + "DO"), ("T" + "BD"), ("FIX" + "ME"), ("implement " + "later"), ("fill in " + "details"))
          $roots = @(
            "README.md",
            "docs/release",
            "skill-sources",
            "skills",
            "tooling",
            "scripts",
            "packages/testing-runner/src",
            "packages/testing-runner/scripts",
            "packages/testing-runner/tests",
            "packages/testing-runner/examples",
            "packages/testing-runner/package.json",
            "schemas",
            "knowledge"
          )
          $files = foreach ($root in $roots) {
            if (Test-Path -LiteralPath $root -PathType Leaf) {
              Get-Item -LiteralPath $root
            } elseif (Test-Path -LiteralPath $root -PathType Container) {
              Get-ChildItem -LiteralPath $root -Recurse -File
            }
          }
          $files += Get-ChildItem -LiteralPath . -Filter "*_Skill.md" -File
          $hits = $files | Select-String -SimpleMatch -Pattern $patterns
          if ($hits) { $hits; exit 1 }

      - name: Diff check
        run: git diff --check
