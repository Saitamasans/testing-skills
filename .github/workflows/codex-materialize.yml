name: Materialize Codex change

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/codex-materialize/**"
      - ".github/workflows/codex-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'codex/actual-results-case-isolation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified change
        shell: bash
        run: |
          set -euo pipefail
          cat .github/codex-materialize/chunk-* > /tmp/change.patch.gz.b64
          base64 --decode /tmp/change.patch.gz.b64 | gzip --decompress > /tmp/change.patch
          echo "5a81f37c4a02ccf284cafccba1d07fd516da59667bc7c4b4b86064e77db4b774  /tmp/change.patch" | sha256sum --check
          git apply --index /tmp/change.patch
          rm -rf .github/codex-materialize .github/workflows/codex-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: isolate test cases and preserve actual results"
          git push origin "HEAD:${{ github.head_ref }}"
