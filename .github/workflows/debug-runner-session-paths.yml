name: Debug Runner runtime-session paths

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: npm
      - shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          node node_modules/playwright/cli.js install chromium
          npm run build --workspace @saitamasans/testing-runner
          python - <<'PY'
          from pathlib import Path
          target = Path("packages/testing-runner/src/commands/plan.ts")
          source = target.read_text(encoding="utf-8")
          old = 'if (options.runtimeSession && path.resolve(options.outputDir).toLowerCase() !== options.runtimeSession.runRoot.toLowerCase()) {\n    throw new Error("runtime_session_output_dir_mismatch");\n  }'
          new = 'if (options.runtimeSession && path.resolve(options.outputDir).toLowerCase() !== options.runtimeSession.runRoot.toLowerCase()) {\n    console.error(JSON.stringify({ runtime_session_path_diagnostic: { requested: options.outputDir, resolved: path.resolve(options.outputDir), session_run_root: options.runtimeSession.runRoot } }));\n    throw new Error("runtime_session_output_dir_mismatch");\n  }'
          if old not in source:
              raise SystemExit("diagnostic patch anchor missing")
          target.write_text(source.replace(old, new), encoding="utf-8")
          PY
          npm test --workspace @saitamasans/testing-runner
