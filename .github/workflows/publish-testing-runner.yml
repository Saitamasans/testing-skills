name: Publish immutable testing Runner

on:
  push:
    tags:
      - "testing-runner-v1.1.1"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing reviewed Runner tag to publish
        required: true
        default: testing-runner-v1.1.1
        type: string

concurrency:
  group: testing-runner-release-${{ github.repository }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  EXPECTED_TAG: testing-runner-v1.1.1
  EXPECTED_VERSION: 1.1.1
  RUNNER_ASSET: saitamasans-testing-runner-1.1.1.tgz

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      commit: ${{ steps.identity.outputs.commit }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: true
      - id: identity
        name: Verify immutable Runner tag and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          test "$tag" = "$EXPECTED_TAG"
          test "$(node -p "require('./packages/testing-runner/package.json').version")" = "$EXPECTED_VERSION"
          git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          commit="$(git rev-parse "refs/tags/$tag^{commit}")"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then test "$commit" = "$GITHUB_SHA"; fi
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$commit" "refs/remotes/origin/main"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

  build-and-contract-test:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate-tag.outputs.commit }}
          clean: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Build, test, and package the exact Runner
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          node node_modules/playwright/cli.js install --with-deps chromium
          npm run build --workspace @saitamasans/testing-runner
          npm test --workspace @saitamasans/testing-runner
          npm run pack:runner-release
          test -f "build/releases/$RUNNER_ASSET"
          test -f "build/releases/$RUNNER_ASSET.sha256"
          grep -Fx "$(sha256sum "build/releases/$RUNNER_ASSET" | sed 's#  build/releases/#  #')" \
            "build/releases/$RUNNER_ASSET.sha256"
          sha256sum "build/releases/$RUNNER_ASSET" "build/releases/$RUNNER_ASSET.sha256" |
            sed 's#  build/releases/#  #' | LC_ALL=C sort -k2 > build/releases/SHA256SUMS.txt
          node - <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const asset = "build/releases/saitamasans-testing-runner-1.1.1.tgz";
          const release = JSON.parse(fs.readFileSync("skill-sources/web-api-test-execution-evidence/assets/runner-release.json", "utf8")).runner;
          const lock = JSON.parse(fs.readFileSync("packages/testing-runner/release/windows-runtime-lock.json", "utf8")).runner;
          const bytes = fs.readFileSync(asset);
          const actual = { size_bytes: bytes.length, sha256: crypto.createHash("sha256").update(bytes).digest("hex") };
          for (const expected of [release, lock]) {
            if (expected.name !== "@saitamasans/testing-runner" || expected.version !== "1.1.1") throw new Error("locked Runner identity mismatch");
            if (expected.size_bytes !== actual.size_bytes || expected.sha256 !== actual.sha256) throw new Error("built Runner does not match locked size and SHA-256");
          }
          NODE
      - name: Inspect packaged Runner contract
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/runner-inspection
          mkdir -p build/runner-inspection
          tar -xzf "build/releases/$RUNNER_ASSET" -C build/runner-inspection
          node - <<'NODE'
          const fs = require("node:fs");
          const root = "build/runner-inspection/package";
          const pkg = JSON.parse(fs.readFileSync(`${root}/package.json`, "utf8"));
          if (pkg.name !== "@saitamasans/testing-runner" || pkg.version !== "1.1.1") throw new Error("Runner package identity mismatch");
          if (pkg.dependencies?.playwright !== "1.61.1") throw new Error('"playwright": "1.61.1" is required');
          for (const relative of [
            "dist/cli.js", "dist/commands/run.js", "dist/commands/verify-report.js",
            "dist/reporting/report-projector.js", "vendor/test-case-renderer.mjs",
            "node_modules/playwright/cli.js", "node_modules/playwright-core/browsers.json",
          ]) if (!fs.statSync(`${root}/${relative}`).isFile()) throw new Error(`missing packaged Runner file: ${relative}`);
          const cli = fs.readFileSync(`${root}/dist/cli.js`, "utf8");
          if (!cli.includes("1.1.1")) throw new Error("compiled CLI does not expose Runner 1.1.1");
          const run = fs.readFileSync(`${root}/dist/commands/run.js`, "utf8");
          if (!run.includes("run-result.json")) throw new Error("packaged Runner lacks current result behavior");
          const browsers = JSON.parse(fs.readFileSync(`${root}/node_modules/playwright-core/browsers.json`, "utf8")).browsers;
          for (const [name, revision] of [["chromium", "1228"], ["chromium-headless-shell", "1228"], ["ffmpeg", "1011"]]) {
            const entry = browsers.find((value) => value.name === name);
            if (entry?.revision !== revision || entry.installByDefault !== true) throw new Error(`packaged Playwright ${name} identity mismatch`);
          }
          NODE
          grep -F "installation-smoke-test.mjs" packages/testing-runner/scripts/build-windows-bundle.mjs
          grep -F "1.1.1" packages/testing-runner/scripts/installation-smoke-test.mjs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verified-testing-runner-1.1.1-assets
          path: |
            build/releases/saitamasans-testing-runner-1.1.1.tgz
            build/releases/saitamasans-testing-runner-1.1.1.tgz.sha256
            build/releases/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  attest-assets:
    needs: build-and-contract-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verified-testing-runner-1.1.1-assets
          path: build/runner-release
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/runner-release/*

  create-draft:
    needs: [validate-tag, build-and-contract-test, attest-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verified-testing-runner-1.1.1-assets
          path: build/trusted
      - name: Create non-overwritable Runner draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
          TAG_COMMIT: ${{ needs.validate-tag.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Runner Release already exists and must never be overwritten" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" --draft --verify-tag --target "$TAG_COMMIT" \
            --title "Testing Runner 1.1.1" build/trusted/*
          mkdir build/draft
          gh release download "$RELEASE_TAG" --dir build/draft
          diff --no-dereference --recursive build/trusted build/draft

  publish-release:
    needs: [validate-tag, create-draft]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verified-testing-runner-1.1.1-assets
          path: build/trusted
      - name: Verify immutable releases are enabled
        env:
          GH_TOKEN: ${{ secrets.IMMUTABLE_RELEASES_ADMIN_READ_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || { echo "immutable release settings admin-read token is not configured" >&2; exit 1; }
          test "$(gh api "repos/$GITHUB_REPOSITORY/immutable-releases" --jq .enabled)" = true
      - name: Reverify draft provenance and publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
          TAG_COMMIT: ${{ needs.validate-tag.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" = "$TAG_COMMIT"
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > build/release.json
          node - "$RELEASE_TAG" "$TAG_COMMIT" build/release.json <<'NODE'
          const fs = require("node:fs");
          const [tag, commit, file] = process.argv.slice(2);
          const release = JSON.parse(fs.readFileSync(file, "utf8"));
          const expected = ["SHA256SUMS.txt", "saitamasans-testing-runner-1.1.1.tgz", "saitamasans-testing-runner-1.1.1.tgz.sha256"];
          const actual = release.assets.map(({ name }) => name).sort();
          if (!release.draft || release.tag_name !== tag || release.target_commitish !== commit) throw new Error("Runner draft identity changed");
          if (JSON.stringify(actual) !== JSON.stringify(expected)) throw new Error("Runner draft asset allowlist changed");
          NODE
          rm -rf build/draft && mkdir build/draft
          gh release download "$RELEASE_TAG" --dir build/draft
          diff --no-dereference --recursive build/trusted build/draft
          gh attestation verify "build/draft/$RUNNER_ASSET" --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "https://github.com/$GITHUB_REPOSITORY/.github/workflows/publish-testing-runner.yml"
          gh release edit "$RELEASE_TAG" --draft=false

  post-publish-verify:
    needs: [validate-tag, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: verified-testing-runner-1.1.1-assets
          path: build/trusted
      - name: Verify public immutable Runner bytes and package contract
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
          TAG_COMMIT: ${{ needs.validate-tag.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > build/public-release.json
          node - "$RELEASE_TAG" "$TAG_COMMIT" build/public-release.json <<'NODE'
          const fs = require("node:fs");
          const [tag, commit, file] = process.argv.slice(2);
          const release = JSON.parse(fs.readFileSync(file, "utf8"));
          if (release.immutable !== true) throw new Error("published Runner release is not immutable");
          if (release.draft || release.tag_name !== tag || release.target_commitish !== commit) throw new Error("published Runner release identity is invalid");
          NODE
          mkdir build/public
          gh release download "$RELEASE_TAG" --dir build/public
          diff --no-dereference --recursive build/trusted build/public
          (cd build/public && sha256sum -c SHA256SUMS.txt)
          gh attestation verify "build/public/$RUNNER_ASSET" --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "https://github.com/$GITHUB_REPOSITORY/.github/workflows/publish-testing-runner.yml"
          mkdir build/public-package
          tar -xzf "build/public/$RUNNER_ASSET" -C build/public-package
          node - <<'NODE'
          const fs = require("node:fs");
          const root = "build/public-package/package";
          const pkg = JSON.parse(fs.readFileSync(`${root}/package.json`, "utf8"));
          if (pkg.version !== "1.1.1" || pkg.dependencies?.playwright !== "1.61.1") throw new Error("public Runner package contract mismatch");
          for (const file of ["dist/cli.js", "dist/commands/run.js", "dist/commands/verify-report.js", "vendor/test-case-renderer.mjs"]) {
            if (!fs.statSync(`${root}/${file}`).isFile()) throw new Error(`public Runner is missing ${file}`);
          }
          NODE
