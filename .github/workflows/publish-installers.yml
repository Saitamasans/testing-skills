name: Publish Windows skill installers

on:
  push:
    branches: [main]
    paths:
      - "installers/*.cmd"
      - ".github/workflows/publish-installers.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release source
        uses: actions/checkout@v4

      - name: Validate and publish all Windows launchers
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(find installers -maxdepth 1 -type f -name 'install-*.cmd' | wc -l)" -eq 9
          sha256sum installers/*.cmd
          gh release upload skill-installers-v1 installers/*.cmd --clobber
